name = "custom-domain-tracking"
main = "src/worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "SUBDOMAINS"
id = "<KV_NAMESPACE_ID>"

[vars]
FALLBACK_ORIGIN = "fallback.yourdomain.com"

# Secrets (set via `wrangler secret put`):
#   CF_API_TOKEN
#   CF_ZONE_ID
#   WEBHOOK_URL
#   WEBHOOK_SECRET
#   WEBHOOK_DEAD_LETTER_URL (optional)
#   RATE_LIMIT_REDIS_URL (optional — Upstash REST URL, e.g. https://xxx.upstash.io or https://user:pass@xxx.upstash.io)
#   RATE_LIMIT_REDIS_TOKEN (optional — Bearer token, not needed if auth is in the URL)

[triggers]
crons = ["*/5 * * * *"]
